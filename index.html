<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE CODING | Modern Chatbot Workflow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>VIBE CODING</h1>
        <p class="subtitle">MODERN CHATBOT WORKFLOW</p>
    </header>

    <nav id="tab-container">
        </nav>

    <main id="workout-content">
        <div class="loader">Loading your program...</div>
    </main>

    <footer>
        <p>© 2026 High-Value Lifestyle Design</p>
    </footer>

    <div id="drawer-overlay"></div>
    <div id="side-drawer">
        <div class="drawer-header">
            <h3>Blueprint: The Kickstart</h3>
            <button id="close-drawer" aria-label="Close drawer">×</button>
        </div>
        <div class="drawer-content">
            <div class="placeholder-content">
                <p>Establishing AI Blueprint...</p>
                <div class="shimmer-line"></div>
                <div class="shimmer-line shorter"></div>
                <p style="margin-top: 20px;">Describe your vision below to generate a focused implementation plan.</p>
                <textarea placeholder="e.g., 'I want to build a fitness dashboard with bento-style cards and smooth transitions...'" class="placeholder-input"></textarea>
                <button class="placeholder-action">Generate Blueprint</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
